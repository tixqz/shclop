# -- Number of backend replicas
replicas: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: shclop
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  # -- Additional annotations for the Service
  annotations: {}
  # -- Add prometheus scrape annotations when serviceMonitor is disabled
  prometheusScrape: true

ingress:
  # -- Create an Ingress for the backend Service
  enabled: false
  # -- IngressClass name (for example: traefik, nginx)
  className: ""
  # -- Public hostname for the backend (for example: shclop.<node-ip>.nip.io)
  host: ""
  # -- Request path routed to the backend Service
  path: /
  # -- Kubernetes Ingress pathType
  pathType: Prefix
  # -- Additional annotations for the Ingress
  annotations: {}
  tls:
    # -- Enable TLS on the Ingress
    enabled: false
    # -- TLS Secret name (empty = <release-fullname>-tls)
    secretName: ""
    # -- cert-manager ClusterIssuer name; when set, adds cert-manager.io/cluster-issuer
    clusterIssuer: ""

monitoring:
  serviceMonitor:
    # -- Create a ServiceMonitor CR for the backend
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # -- Additional labels for the ServiceMonitor resource
    labels: {}

postgresql:
  # -- Deploy a bundled single-node PostgreSQL instance
  # -- Ignored when postgresql.existingSecret.name is set
  bundled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # -- PostgreSQL database name (bundled mode)
  database: shclop
  # -- PostgreSQL user (bundled mode)
  user: shclop
  # -- PostgreSQL password (bundled mode; auto-generated if empty)
  password: ""
  # -- Reference an existing Secret containing the full PostgreSQL DSN
  # -- The Secret must have a key holding the DSN string (e.g. "dsn").
  # -- When set, bundled is ignored and the backend reads the DSN from this Secret.
  existingSecret:
    name: ""
    key: dsn
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  persistence:
    size: 8Gi
    storageClass: ""

sandbox:
  # -- Sandbox provider (must be "kubernetes" for production)
  provider: kubernetes
  kubernetes:
    # -- Namespace where sandbox (agent) pods are created
    namespace: shclop-sandbox
    # -- WebSocket gateway URL for sandbox communication (empty = release backend Service)
    gatewayURL: ""
    workspace:
      # -- Persistent volume size per workspace
      size: 10Gi
      # -- Storage class for workspace PVCs (empty = cluster default)
      storageClassName: ""
      # -- Workspace retention policy
      retention: delete
    networkPolicy:
      # -- Enable network policy enforcement for sandbox pods
      enabled: true
      # -- Comma-separated list of allowed egress CIDRs
      allowedCIDRs: "0.0.0.0/0"
    # -- Secret store backend (immutable: "kubernetes")
    secretStore: kubernetes

agentRuntime:
  # -- Kata Containers RuntimeClass name (MANDATORY — must be non-empty)
  runtimeClassName: kata
  images:
    # -- OpenClaw runtime container image
    openclaw: shclop-runtime-openclaw:latest
    # -- NanoClaw runtime container image
    nanoclaw: shclop-runtime-nanoclaw:latest

llmGateway:
  # -- Base URL for the LLM gateway
  baseURL: ""
  litellm:
    # -- Use an internal LiteLLM ClusterIP service installed by bootstrap
    enabled: false
    # -- Kubernetes Service name for the LiteLLM proxy
    serviceName: litellm
    # -- Kubernetes namespace for the LiteLLM proxy (empty = this release namespace)
    namespace: ""
    # -- HTTP port exposed by the LiteLLM Service
    port: 4000
  # -- Reference an existing Kubernetes Secret containing the LLM gateway API key
  existingSecret:
    name: ""
    # -- Key within the Secret that holds the API key
    key: api-key

bootstrapAdmin:
  # -- Initial admin username created on first start
  username: admin
  # -- Reference an existing Secret containing the admin password
  # -- When set, bootstrapAdmin.password is ignored
  existingSecret:
    name: ""
    # -- Key within the Secret that holds the password
    key: password
  # -- Admin password (used when existingSecret.name is empty; auto-generated if both empty)
  password: ""

observability:
  # -- Default retention period in days for logs and metrics
  retentionDays: 7
  # -- Prometheus server guidance (NOT installed by this chart)
  prometheus:
    enabled: false
    # -- Helm release name of the installed standalone prometheus chart
    releaseName: prometheus-server
  # -- Loki log storage guidance (NOT installed by this chart)
  loki:
    enabled: false
    # -- Helm release name of the installed loki chart
    releaseName: loki
  # -- Fluent Bit log collection guidance (NOT installed by this chart)
  fluentBit:
    enabled: false
    # -- Helm release name of the installed fluent-bit chart
    releaseName: fluent-bit
  # -- Grafana guidance (NOT installed by this chart)
  grafana:
    enabled: false
    # -- Helm release name of the installed grafana chart
    releaseName: grafana
    # -- External URL shown in the admin UI
    url: ""
