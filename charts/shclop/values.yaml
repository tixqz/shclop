image:
  repository: shclop
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

config:
  logLevel: info
  metrics: true
  store: inmemory
  postgresDSNSecret:
    name: ""
    key: dsn

identity:
  provider: local
  mockYAMLPath: config/identity.mock.yaml

sandbox:
  provider: mock
  dockerGatewayURL: ws://host.docker.internal:8080/runtime/ws
  runtimeImagePrefix: shclop-runtime

agentRuntime:
  runtimeClassName: kata
  images:
    nanoclaw: shclop-runtime-nanoclaw:latest
    nemoclaw: shclop-runtime-nemoclaw:latest
    openclaw: shclop-runtime-openclaw:latest

dependencies:
  bundledPostgres: true
  bundledVault: true
  bundledMinIO: true
