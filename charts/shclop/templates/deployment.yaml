apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/name: shclop
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shclop
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shclop
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shclop
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: shclop
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    spec:
      containers:
        - name: shclop
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--addr=:8080"
            - "--log-level={{ .Values.config.logLevel }}"
            - "--metrics={{ .Values.config.metrics }}"
            - "--store={{ .Values.config.store }}"
            - "--identity-provider={{ .Values.identity.provider }}"
            - "--identity-mock-yaml={{ .Values.identity.mockYAMLPath }}"
            - "--sandbox-provider={{ .Values.sandbox.provider }}"
            - "--docker-gateway-url={{ .Values.sandbox.dockerGatewayURL }}"
            - "--runtime-image-prefix={{ .Values.sandbox.runtimeImagePrefix }}"
          env:
            {{- if .Values.config.postgresDSNSecret.name }}
            - name: SHCLOP_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.postgresDSNSecret.name }}
                  key: {{ .Values.config.postgresDSNSecret.key }}
            {{- end }}
            - name: SHCLOP_AGENT_RUNTIME_CLASS
              value: {{ .Values.agentRuntime.runtimeClassName | quote }}
            - name: SHCLOP_RUNTIME_IMAGE_NANOCLAW
              value: {{ .Values.agentRuntime.images.nanoclaw | quote }}
            - name: SHCLOP_RUNTIME_IMAGE_NEMOCLAW
              value: {{ .Values.agentRuntime.images.nemoclaw | quote }}
            - name: SHCLOP_RUNTIME_IMAGE_OPENCLAW
              value: {{ .Values.agentRuntime.images.openclaw | quote }}
          ports:
            - containerPort: 8080
