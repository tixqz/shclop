{{- if and (not .Values.bootstrapAdmin.existingSecret.name) (or .Values.bootstrapAdmin.password (not .Values.bootstrapAdmin.password)) -}}
{{- $fullname := include "shclop.fullname" . -}}
{{- $adminPassword := .Values.bootstrapAdmin.password -}}
{{- if not $adminPassword -}}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-bootstrap-admin" $fullname)) -}}
  {{- if $existingSecret -}}
    {{- $adminPassword = index $existingSecret.data "password" | b64dec -}}
  {{- else -}}
    {{- $adminPassword = randAlphaNum 24 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-bootstrap-admin
  labels:
    {{- include "shclop.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ $adminPassword | quote }}
{{- end }}
