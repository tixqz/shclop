name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  verify:
    name: Verify before publishing
    uses: ./.github/workflows/ci.yml

  images:
    name: Publish ${{ matrix.image }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: shclop
            dockerfile: Dockerfile
          - image: shclop-runtime-openclaw
            dockerfile: runtime/openclaw/Dockerfile
          - image: shclop-runtime-nanoclaw
            dockerfile: runtime/nanoclaw/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm-chart:
    name: Publish Helm chart
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Check tag matches chart version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          chart_version="$(awk -F': ' '/^version:/ {print $2}' charts/shclop/Chart.yaml | tr -d '"')"
          if [ "$tag_version" != "$chart_version" ]; then
            echo "tag v${tag_version} does not match charts/shclop/Chart.yaml version ${chart_version}"
            exit 1
          fi

      - name: Log in to GitHub Container Registry for Helm OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/helm
          helm package charts/shclop \
            --version "$version" \
            --app-version "$version" \
            --destination dist/helm
          helm push "dist/helm/shclop-${version}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
